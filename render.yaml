services:
  - type: web
    name: skater-punk-proxy
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: FAL_KEY
        sync: false   # REQUIRED: set this secret in the Render dashboard
      - key: STRIPE_SECRET_KEY
        sync: false   # REQUIRED: set this secret in the Render dashboard
      - key: STRIPE_WEBHOOK_SECRET
        sync: false   # REQUIRED: set this secret in the Render dashboard
      - key: ADMIN_EMAILS
        sync: false   # REQUIRED: set this secret in the Render dashboard
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false   # REQUIRED: set this secret in the Render dashboard
      - key: REDIS_URL
        sync: false   # OPTIONAL: set to enable shared Redis-backed rate limiting
